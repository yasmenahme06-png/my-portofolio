<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eng. Yasmen | Portfolio</title>
<link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="./Yasmeen Ahmed.css">
</head>
<body>
<div id="balloon-container"></div>
<div class="container">
    <header class="header-nav">
        <div class="logo">Eng. Yasmen</div>
        <div class="nav-links">
            <div class="nav-btn">Home</div>
            <div class="nav-btn">About</div>
            <div class="nav-btn" id="contactBtn">
                Contact
                <div id="contactCloud" class="contact-cloud">
                    <a href="mailto:yasmenahme06@gmail.com"><i class="fas fa-envelope"></i> yasmenahme06@gmail.com</a>
                    <a href="tel:+201099286583"><i class="fas fa-phone"></i> +201099286583</a>
                </div>
            </div>
        </div>
    </header>

    <div class="grid-container">
        <div class="column">
            <div class="card">
                <h3>Skills</h3>
                <div style="display:flex; flex-wrap:wrap; gap:8px;">
                    <span class="tag">HTML5</span> <span class="tag">CSS3</span> <span class="tag">JS</span> <span class="tag">Responsive</span>
                </div>
            </div>
            
            <div class="card">
                <h3>Tic-Tac-Toe</h3>
                <div class="board" id="board">
                    <div class="cell" data-index="0"></div><div class="cell" data-index="1"></div><div class="cell" data-index="2"></div>
                    <div class="cell" data-index="3"></div><div class="cell" data-index="4"></div><div class="cell" data-index="5"></div>
                    <div class="cell" data-index="6"></div><div class="cell" data-index="7"></div><div class="cell" data-index="8"></div>
                </div>
                <p id="status" style="color:var(--pink); font-size: 0.9rem;"></p>
                <button onclick="resetGame()" style="background:none; border:1px solid white; color:white; border-radius:5px; padding:3px 10px; cursor:pointer;">Reset</button>
            </div>

            <div class="card" style="text-align: center;">
                <div id="clock"></div>
                <div id="date"></div>
            </div>
        </div>

        <div class="column">
            <div class="card">
                <h1>Hi, I'm <span style="color:var(--pink)">Yasmen</span></h1>
                <p>Web Development Student & Front-end Enthusiast.</p>
            </div>

            <div class="card">
                <h3>Education</h3>
                <p>Specializing in Web Development at BUA.</p>
            </div>

            <div class="card">
                <h3>To-Do List</h3>
                <div class="todo-input-row">
                    <input type="text" id="todoInput" placeholder="Add a task...">
                    <button class="circle-btn" onclick="addTodo()">+</button>
                </div>
                <ul id="todoList" style="list-style:none; padding:0; margin-top:15px;"></ul>
            </div>
        </div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
