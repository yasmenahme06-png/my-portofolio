<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eng. Yasmen | Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0d0d0d;
            --card-gradient: linear-gradient(135deg, #802a45 0%, #1a1a1a 100%);
            --pink: #ff4d6d;
            --glass: rgba(255, 255, 255, 0.1);
        }
        body {
            margin: 0; background: var(--bg);
             color: white;
            font-family: 'Segoe UI', sans-serif; 
            display: flex;
             justify-content: center;
            direction: ltr;
        }
        .container { width: 95%; max-width: 1200px; padding: 20px; }

        /* Header */
        .header-nav {
             display: flex;
             justify-content: space-between;
              align-items: center;
               margin-bottom: 30px;
             }
        .logo {
             background: var(--glass);
             padding: 10px 25px; border-radius: 50px;
              border: 1px solid rgba(255,255,255,0.2);
               font-weight: bold;
             }
        .nav-links { display: flex; 
            gap: 15px;
         }
        .nav-btn { 
            background: var(--glass);
             padding: 8px 18px; border-radius: 50px;
              border: 1px solid rgba(255,255,255,0.1); 
              color: white; cursor: pointer; 
              position: relative;
             }
        .nav-btn:hover { background: var(--pink); }

        /* Contact Cloud */
        .contact-cloud {
            position: absolute; 
            top: 130%; left: 50%;
             transform: translateX(-50%) scale(0.8);
            background: white; color: #333; 
            padding: 15px;
             border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            display: none; 
            flex-direction: column; 
            gap: 12px;
            z-index: 1000;
             min-width: 250px; 
             opacity: 0; 
             transition: 0.3s ease;
        }
        .contact-cloud.show { 
            display: flex;
             opacity: 1; 
            transform: translateX(-50%) scale(1); 
        }
        .contact-cloud::after { 
        content: '';
         position: absolute; top: -10px; left: 50%;
          transform: translateX(-50%);
           border-left: 10px solid transparent;
            border-right: 10px solid transparent;
             border-bottom: 10px solid white;
             }
        .contact-cloud a {
             color: #333;
             text-decoration: none; display: flex;
              align-items: center; gap: 10px;
               font-size: 0.9rem;
             }
        .contact-cloud i { color: var(--pink); }

        /* Grid Layout */
        .grid-container { display: grid;
             grid-template-columns: 1fr 2fr;
              gap: 20px;
             }
        .column {
             display: flex;
             flex-direction: column;
              gap: 20px;
             }
        .card {
             background: var(--card-gradient);
             border-radius: 30px;
              padding: 25px;
               border: 1px solid rgba(255,255,255,0.05); 
            }

        /* Skills Tags */
        .tag {
             background: var(--glass); padding: 5px 15px;
             border-radius: 20px;
              font-size: 0.8rem;
               margin-right: 5px; 
               border: 1px solid rgba(255,255,255,0.1); 
            }

        /* Tic Tac Toe */
        .board {
             display: grid;
             grid-template-columns: repeat(3, 1fr);
              gap: 5px; width: 150px;
               margin: 15px 0;
             }
        .cell { 
            width: 50px;
             height: 50px;
              background: var(--glass);
               display: flex; 
               align-items: center;
                justify-content: center;
                 cursor: pointer;
                  border-radius: 8px;
                   font-weight: bold;
                 }
        .todo-input-row {
             display: flex;
             gap: 10px;
              margin-top: 15px;
             }
        #todoInput { 
            flex: 1;
             background: var(--glass);
              border: 1px solid rgba(255,255,255,0.2);
               border-radius: 12px;
                padding: 10px;
                 color: white;
                 }
        .circle-btn { 
            width: 40px;
             height: 40px;
              border-radius: 50%; 
              border: 1px solid white;
               background: none;
                color: white;
                 cursor: pointer;
                  font-size: 20px;
                 }
        .todo-item { 
            background: rgba(0,0,0,0.3);
             padding: 10px;
              border-radius: 10px; 
              margin-bottom: 8px;
               display: flex;
                align-items: center;
                 gap: 10px; 
                }
        .todo-item.completed span {
             text-decoration: line-through; 
            opacity: 0.5;
         }
        .todo-checkbox {
             accent-color: var(--pink); 
            cursor: pointer;
             width: 18px; 
             height: 18px;
             }

        /* Clock */
        #clock { 
            font-size: 2.2rem;
             font-family: monospace;
              font-weight: bold;
               color: var(--pink);
             }
        #date { 
            font-size: 0.9rem;
             opacity: 0.7;
             }
        #balloon-container {
            position: fixed; top: 0;
             left: 0; width: 100%;
             height: 100%;
            pointer-events: none;
             z-index: 9999;
              overflow: hidden;
        }
        .balloon {
            position: absolute;
             bottom: -100px;
              width: 30px;
               height: 40px;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            animation: floatUp 4s linear forwards;
        }
        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-120vh); opacity: 0; }
        }
    </style>
</head>
<body>
<div id="balloon-container"></div>
<div class="container">
    <header class="header-nav">
        <div class="logo">Eng. Yasmen</div>
        <div class="nav-links">
            <div class="nav-btn">Home</div>
            <div class="nav-btn">About</div>
            <div class="nav-btn" id="contactBtn">
                Contact
                <div id="contactCloud" class="contact-cloud">
                    <a href="mailto:yasmenahme06@gmail.com"><i class="fas fa-envelope"></i> yasmenahme06@gmail.com</a>
                    <a href="tel:+201099286583"><i class="fas fa-phone"></i> +201099286583</a>
                </div>
            </div>
        </div>
    </header>
    <div class="grid-container">
        <div class="column">
            <div class="card">
                <h3>Skills</h3>
                <div style="display:flex; flex-wrap:wrap; gap:8px;">
                    <span class="tag">HTML5</span> <span class="tag">CSS3</span> <span class="tag">JS</span> <span class="tag">Responsive</span>
                </div>
            </div>
            <div class="card">
                <h3>Tic-Tac-Toe</h3>
                <div class="board" id="board">
                    <div class="cell" data-index="0"></div><div class="cell" data-index="1"></div><div class="cell" data-index="2"></div>
                    <div class="cell" data-index="3"></div><div class="cell" data-index="4"></div><div class="cell" data-index="5"></div>
                    <div class="cell" data-index="6"></div><div class="cell" data-index="7"></div><div class="cell" data-index="8"></div>
                </div>
                <p id="status" style="color:var(--pink); font-size: 0.9rem;"></p>
                <button onclick="resetGame()" style="background:none; border:1px solid white; color:white; border-radius:5px; padding:3px 10px; cursor:pointer;">Reset</button>
            </div>
            <div class="card" style="text-align: center;">
                <div id="clock"></div>
                <div id="date"></div>
            </div>
        </div>
        <div class="column">
            <div class="card">
                <h1>Hi, I'm <span style="color:var(--pink)">Yasmen</span></h1>
                <p>Web Development Student & Front-end Enthusiast.</p>
            </div>

            <div class="card">
                <h3>Education</h3>
                <p>Specializing in Web Development at BUA.</p>
            </div>
            <div class="card">
                <h3>To-Do List</h3>
                <div class="todo-input-row">
                    <input type="text" id="todoInput" placeholder="Add a task...">
                    <button class="circle-btn" onclick="addTodo()">+</button>
                </div>
                <ul id="todoList" style="list-style:none; padding:0; margin-top:15px;"></ul>
            </div>
        </div>
    </div>
</div>

<script>
    // 1. Contact Cloud
    const contactBtn = document.getElementById('contactBtn');
    const contactCloud = document.getElementById('contactCloud');
    contactBtn.addEventListener('click', (e) => { e.stopPropagation(); contactCloud.classList.toggle('show'); });
    document.addEventListener('click', (e) => { if (!contactCloud.contains(e.target)) contactCloud.classList.remove('show'); });
    function addTodo() {
        const input = document.getElementById('todoInput');
        const list = document.getElementById('todoList');
        if (input.value.trim() === '') return;
        const li = document.createElement('li');
        li.className = 'todo-item';
        li.innerHTML = `
            <input type="checkbox" class="todo-checkbox" onchange="this.parentElement.classList.toggle('completed')">
            <span style="flex-grow:1">${input.value}</span>
            <i class="fas fa-trash" onclick="this.parentElement.remove()" style="cursor:pointer; color:var(--pink)"></i>
        `;
        list.appendChild(li);
        input.value = '';
    }
    document.getElementById('todoInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') addTodo(); });
    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('en-US', { hour12: true });
        document.getElementById('date').innerText = now.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
    }
    setInterval(updateClock, 1000); updateClock();
    // 4. Tic Tac Toe Logic
    let currentPlayer = 'X', gameState = ["", "", "", "", "", "", "", "", ""];
    const cells = document.querySelectorAll('.cell');
    cells.forEach(cell => {
        cell.addEventListener('click', () => {
            const index = cell.getAttribute('data-index');
            if (gameState[index] !== "" || checkWinner()) return;
            gameState[index] = currentPlayer;
            cell.innerText = currentPlayer;
            cell.style.color = currentPlayer === 'X' ? 'var(--pink)' : '#4ade80';
            if (checkWinner()) {
                document.getElementById('status').innerText = `Winner: ${currentPlayer}!`;
                startCelebration(); // <--- نداء وظيفة البلالين
            }
            else if (!gameState.includes("")) document.getElementById('status').innerText = "Draw!";
            else currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
        });
    });

    function checkWinner() {
        const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
        return wins.some(p => gameState[p[0]] && gameState[p[0]] === gameState[p[1]] && gameState[p[0]] === gameState[p[2]]);
    }
    function resetGame() {
        gameState = ["", "", "", "", "", "", "", "", ""];
        cells.forEach(c => c.innerText = "");
        document.getElementById('status').innerText = "";
        currentPlayer = 'X';
    }
    // --- وظيفة الاحتفال بالبلالين ---
    function startCelebration() {
        const container = document.getElementById('balloon-container');
        for(let i=0; i<30; i++) {
            setTimeout(() => {
                const b = document.createElement('div');
                b.className = 'balloon';
                b.style.left = Math.random() * 100 + '%';
                b.style.backgroundColor = ['#ff4d6d', '#ffd700', '#c026d3', '#4ade80'][Math.floor(Math.random()*4)];
                container.appendChild(b);
                setTimeout(() => b.remove(), 4000);
            }, i * 150);
        }
    }
</script>
</body>
</html>
